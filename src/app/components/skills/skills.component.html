<section id="skills" class="skills-section py-5">
  <div class="container">
    <h2 class="section-title" appAos>Habilidades</h2>
    <hr class="section-divider" appAos [aosDelay]="100" />

    <div class="row">
      <!-- Front-End Skills -->
      <div class="col-12 col-md-6 skills-category px-5 mt-3">
        <h3 class="skills-category-title">Front-End</h3>
        <div class="skill-item" *ngFor="let skill of habilidadesFront; let i = index" appAos [aosDelay]="i * 70">
          <div class="skill-icon-fallback">{{ skill.nombre.slice(0,2) }}</div>
          <div class="skill-info">
            <div class="skill-name">
              <span>{{ skill.nombre }}</span>
              <span class="skill-pct">{{ skill.actualProgreso }}%</span>
            </div>
            <div class="progress">
              <div class="progress-bar" role="progressbar"
                [ngStyle]="{ width: skill.actualProgreso + '%' }"
                [attr.aria-valuenow]="skill.actualProgreso"
                aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <button *ngIf="skill.certificado" (click)="openDialog(skill)" class="btnc_ertificado mt-2">Ver Certificado</button>
          </div>
        </div>
      </div>

      <!-- Back-End Skills -->
      <div class="col-12 col-md-6 skills-category px-5 mt-3">
        <h3 class="skills-category-title">Back-End</h3>
        <div class="skill-item" *ngFor="let skill of habilidadesBack; let i = index" appAos aosDir="right" [aosDelay]="i * 70">
          <div class="skill-icon-fallback">{{ skill.nombre.slice(0,2) }}</div>
          <div class="skill-info">
            <div class="skill-name">
              <span>{{ skill.nombre }}</span>
              <span class="skill-pct">{{ skill.actualProgreso }}%</span>
            </div>
            <div class="progress">
              <div class="progress-bar" role="progressbar"
                [ngStyle]="{ width: skill.actualProgreso + '%' }"
                [attr.aria-valuenow]="skill.actualProgreso"
                aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <button *ngIf="skill.certificado" (click)="openDialog(skill)" class="btnc_ertificado mt-2">Ver Certificado</button>
          </div>
        </div>
      </div>
    </div>

    <!-- DevOps & Tools -->
    <div class="skills-tags-section mt-5" appAos [aosDelay]="0">
      <h3 class="skills-category-title">DevOps &amp; Tools</h3>
      <div class="skills-tags">
        <span *ngFor="let tool of devopsSkills" class="skill-tag">{{ tool }}</span>
      </div>
    </div>

    <!-- Soft Skills -->
    <div class="skills-tags-section mt-4" appAos [aosDelay]="100">
      <h3 class="skills-category-title">Soft Skills</h3>
      <div class="skills-tags">
        <span *ngFor="let s of softSkills" class="skill-tag skill-tag--soft">{{ s }}</span>
      </div>
    </div>

    <ng-template #dialogTemplate let-data>
      <button mat-fab class="btncerrar-x" mat-dialog-close><mat-icon>close</mat-icon></button>
      <h2 mat-dialog-title>{{ data.nombre }}</h2>
      <mat-dialog-content>
        <div class="modal-content">
          <div class="modal-description">
            <p>Certificado de {{ data.detalles }}</p>
          </div>
          <div class="modal-image-container">
            <iframe [src]="data.certificado" width="100%" height="500px"></iframe>
          </div>
        </div>
      </mat-dialog-content>
      <mat-dialog-actions>
        <button mat-button class="btncerrar text-center" mat-dialog-close>Cerrar</button>
      </mat-dialog-actions>
    </ng-template>
  </div>
</section>
