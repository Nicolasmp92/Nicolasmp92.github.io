<section id="contact" class="contact-section">
  <div class="container-xxl">
    <h2 class="section-title">Contáctame</h2>
    <hr class="section-divider">

    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">

          <div class="row g-3">
            <div class="col-12 col-sm-6 form-group">
              <label for="contact-name">Nombre</label>
              <input
                type="text"
                id="contact-name"
                name="user_name"
                class="form-control"
                formControlName="name"
                placeholder="Tu nombre"
                aria-label="Nombre completo"
                aria-describedby="nameError">
              <div *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched" id="nameError" class="error-message">
                Nombre requerido — solo letras.
              </div>
            </div>

            <div class="col-12 col-sm-6 form-group">
              <label for="contact-email">Correo electrónico</label>
              <input
                type="email"
                id="contact-email"
                name="user_email"
                class="form-control"
                formControlName="email"
                placeholder="Tu correo electrónico"
                aria-label="Correo electrónico"
                aria-describedby="emailError">
              <div *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched" id="emailError" class="error-message">
                Ingresa un correo electrónico válido.
              </div>
            </div>

            <div class="col-12 col-sm-6 form-group">
              <label for="contact-company">Empresa</label>
              <input
                type="text"
                id="contact-company"
                name="user_company"
                class="form-control"
                formControlName="company"
                placeholder="Nombre de la empresa"
                aria-label="Empresa">
            </div>

            <div class="col-12 col-sm-6 form-group">
              <label for="contact-subject">Asunto</label>
              <input
                type="text"
                id="contact-subject"
                name="user_subject"
                class="form-control"
                formControlName="subject"
                placeholder="Motivo del contacto"
                aria-label="Asunto">
            </div>

            <div class="col-12 form-group">
              <label for="contact-message">Mensaje</label>
              <textarea
                id="contact-message"
                name="user_message"
                class="form-control"
                formControlName="message"
                rows="5"
                placeholder="Tu mensaje"></textarea>
            </div>
          </div>

          <button type="submit" class="btn-submit mt-3" [disabled]="contactForm.invalid || loading">
            <span *ngIf="!loading">Enviar mensaje</span>
            <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          </button>

          <div *ngIf="formSuccess" class="alert-success mt-3">¡Mensaje enviado correctamente!</div>
          <div *ngIf="formError" class="alert-danger mt-3">Hubo un error al enviar el mensaje. Inténtalo nuevamente.</div>
        </form>
      </div>
    </div>
  </div>
</section>
