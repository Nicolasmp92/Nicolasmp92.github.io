

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side"
    [opened]="isSidenavOpen"
    (openedChange)="sidenavState.next($event)"
    [fixedInViewport]="options.value.fixed"
    [fixedTopGap]="options.value.top"
    [fixedBottomGap]="options.value.bottom">

    <div class="sidenav-body">

      <div class="profile-container">
        <a routerLink="/home">
          <div class="image-container">
            <img class="profile-image" src="img/MiFotoDePerfil.jpg" alt="Foto de perfil de Nicolás Muñoz">
          </div>
        </a>
        <p class="sidenav-name">Nicolás Muñoz</p>
        <span class="role-badge">Full Stack Dev</span>
      </div>

      <ul class="contact-info">
        <li>
          <button class="btn-contact" (click)="navigateTo('tel:+56963978090')">
            <i class="bi bi-telephone"></i>
            <span class="contact-text">+569 63978090</span>
          </button>
        </li>
        <li>
          <button class="btn-contact" (click)="navigateTo('tel:+56963978090')">
            <i class="bi bi-telephone"></i>
            <span class="contact-text">+569 62308757</span>
          </button>
        </li>
        <li>
          <button class="btn-contact" (click)="navigateTo('mailto:nikolasmp92@gmail.com')">
            <i class="bi bi-envelope"></i>
            <span class="contact-text">nikolasmp92&#64;gmail.com</span>
          </button>
        </li>
        <li>
          <button class="btn-contact" (click)="navigateTo('https://maps.app.goo.gl/7eTzs1oybKFieuNt7')">
            <i class="bi bi-geo-alt"></i>
            <span class="contact-text">Coltauco, O'Higgins</span>
          </button>
        </li>
        <li>
          <button class="btn-contact">
            <i class="bi bi-calendar3"></i>
            <span class="contact-text">14 de enero de 1992</span>
          </button>
        </li>
      </ul>

    </div>
  </mat-sidenav>


<mat-sidenav-content fxFlexFill cdkScrollable id="sidenav-content">

  <!-- MENU SUPERIOR -->
  <mat-toolbar color="primary" [ngClass]="{'shrink': shrinkToolbar}"
    #toolbar class="navbar navbar-expand-lg sticky-top">
    <div class="navbar-inner">

      <!-- LEFT: sidenav toggle -->
      <button aria-label="Tarjeta de contacto"
        class="toggle-btn"
        mat-button
        (click)="toggleSidenav()"
        [ngClass]="{ 'icon-shake': !isSidenavOpen }">
        <i *ngIf="isSidenavOpen" class="bi bi-x"></i>
        <i *ngIf="!isSidenavOpen" class="bi bi-person-vcard-fill"></i>
      </button>

      <!-- CENTER: nav links (collapses on mobile) -->
      <nav class="collapse navbar-collapse navbar-center" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item" *ngFor="let link of navigationLinks">
            <a class="nav-link"
              [routerLink]="link.path"
              (click)="scrollToSection(link.section); collapseNavbarResponsive(); closeSidenavOnLinkClick()"
              ariaCurrentWhenActive="page"
              mat-button>
              {{ link.label }}
            </a>
          </li>
        </ul>
      </nav>

      <!-- RIGHT: theme toggle + mobile hamburger -->
      <div class="navbar-right">
        <button class="theme-toggle" mat-icon-button
          (click)="themeService.toggle()"
          [attr.aria-label]="themeService.isDark ? 'Activar modo claro' : 'Activar modo oscuro'">
          <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
        <button aria-label="Menu dispositivos móviles"
          class="navbar-toggler mat-menu"
          mat-icon-button type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <mat-icon>menu</mat-icon>
        </button>
      </div>

    </div>
  </mat-toolbar>

    <app-home></app-home>
    <app-about></app-about>
    <app-experience></app-experience>
    <app-skills></app-skills>
    <app-contact></app-contact>

    <app-footer></app-footer>


</mat-sidenav-content>
</mat-sidenav-container>
